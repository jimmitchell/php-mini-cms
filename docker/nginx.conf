# Local development Nginx config — no TLS, PHP-FPM via TCP socket to 'php' container

server {
    listen 80;
    server_name localhost;

    root /var/www/cms;
    index index.html;

    # Match PHP ini upload_max_filesize + post_max_size headroom
    client_max_body_size 55M;

    # Custom error pages
    error_page 404 /404.html;

    # Block sensitive directories
    location ~* ^/(src|data|content|templates|vendor)(/|$) {
        deny all;
        return 403;
    }
    location = /config.php {
        deny all;
        return 403;
    }

    # Media uploads
    # NOTE: Nginx add_header does not inherit from the server block when a
    # location defines its own add_header directives.
    location /media/ {
        alias /var/www/cms/content/media/;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # REST API — all /admin/api/* requests are handled by api.php.
    # This location must appear before /admin/ so Nginx's longest-prefix
    # match routes it here rather than into the try_files block below.
    location /admin/api {
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_param  SCRIPT_FILENAME $document_root/admin/api.php;
        fastcgi_param  SERVER_NAME     $host;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Admin panel - PHP-FPM
    location /admin/ {
        index index.php;
        try_files $uri $uri/ =404;
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   php:9000;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  SERVER_NAME     $host;
            add_header X-Frame-Options          "SAMEORIGIN"    always;
            add_header X-Content-Type-Options   "nosniff"       always;
            add_header X-XSS-Protection         "1; mode=block" always;
            add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy       "geolocation=()" always;
            add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        }
    }

    # Pages — stored under pages/ but served at /{slug}/
    # Block direct /pages/... access; content is served via @page below.
    location /pages/ {
        return 404;
    }

    # Posts — stored under posts/ but served at /YYYY/MM/DD/{slug}/
    # Block direct /posts/... access; content is served via the regex below.
    location /posts/ {
        return 404;
    }

    # Date-based post URLs: /YYYY/MM/DD/{slug}/ → posts/YYYY/MM/DD/{slug}/index.html
    location ~ "^/[0-9]{4}/[0-9]{2}/[0-9]{2}/" {
        rewrite "^/([0-9]{4}/[0-9]{2}/[0-9]{2}/.+\.[^/]+)$" /posts/$1 break;
        rewrite ^/(.+?)/?$ /posts/$1/index.html break;
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://tinylytics.app https://www.googletagmanager.com https://platform.twitter.com https://www.instagram.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://avatars.webmention.io; media-src 'self'; connect-src 'self' https://tinylytics.app https://webmention.io https://www.google-analytics.com; frame-src https://www.youtube-nocookie.com https://player.vimeo.com https://gist.github.com https://www.instagram.com https://platform.twitter.com https://www.linkedin.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Static HTML output
    location / {
        try_files $uri $uri/ $uri/index.html @page;
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://tinylytics.app https://www.googletagmanager.com https://platform.twitter.com https://www.instagram.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://avatars.webmention.io; media-src 'self'; connect-src 'self' https://tinylytics.app https://webmention.io https://www.google-analytics.com; frame-src https://www.youtube-nocookie.com https://player.vimeo.com https://gist.github.com https://www.instagram.com https://platform.twitter.com https://www.linkedin.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Fallback for pages stored under pages/{slug}/index.html.
    # The rewrite strips any trailing slash before constructing the path,
    # avoiding double-slash issues when $uri already ends with /.
    location @page {
        rewrite ^/(.+?)/?$ /pages/$1/index.html break;
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://tinylytics.app https://www.googletagmanager.com https://platform.twitter.com https://www.instagram.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://avatars.webmention.io; media-src 'self'; connect-src 'self' https://tinylytics.app https://webmention.io https://www.google-analytics.com; frame-src https://www.youtube-nocookie.com https://player.vimeo.com https://gist.github.com https://www.instagram.com https://platform.twitter.com https://www.linkedin.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Feed
    location = /feed.xml {
        add_header Content-Type           "application/atom+xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stderr;
}
