; Development PHP settings for Docker

; Error display — on for local dev, off in production
display_errors  = On
log_errors      = On
error_reporting = E_ALL

; Uploads
upload_max_filesize = 50M
post_max_size       = 55M

; Execution
max_execution_time = 60
memory_limit       = 128M

; Timezone
date.timezone = UTC

; Session security (same as production — keeps parity)
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = Strict
